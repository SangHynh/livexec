version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-livexec}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: 
      context: ./server
      dockerfile: Dockerfile
    command: npm run dev
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    env_file:
      - server/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-livexec}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./server:/app
      - /app/node_modules

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: node worker.js
    depends_on:
      - db
      - redis
    env_file:
      - server/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-livexec}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  postgres_data:
