<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVEXEC — Real-time Code Execution</title>
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <span>LIVEXEC</span>
            </div>
            <div class="controls">
                <div class="select-wrapper">
                    <select id="language-select">
                        <option value="javascript">JavaScript (Node.js)</option>
                        <option value="python">Python 3</option>
                    </select>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <button id="run-btn" class="btn-primary">
                    <i class="fas fa-play"></i>
                    <span>Run Code</span>
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main>
            <div class="editor-section">
                <div class="section-header">
                    <i class="fas fa-code"></i>
                    <span>Editor</span>
                    <span id="save-status" class="status-indicator">Saved</span>
                </div>
                <div id="monaco-editor"></div>
            </div>

            <div class="console-section">
                <div class="section-header">
                    <i class="fas fa-terminal"></i>
                    <span>Console</span>
                    <div id="execution-meta" class="hidden">
                        <span class="meta-item"><i class="fas fa-microchip"></i> <span id="time-val">0ms</span></span>
                        <span class="meta-item"><i class="fas fa-wifi"></i> <span id="latency-val">0ms</span></span>
                        <span id="status-badge" class="badge">COMPLETED</span>
                    </div>
                </div>
                <div id="output-container">
                    <div id="stdout" class="output-block"></div>
                    <div id="stderr" class="output-block error"></div>
                    <div id="system-log" class="output-block system">Welcome to LIVEXEC. Press Run to execute your code.</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs/loader.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
